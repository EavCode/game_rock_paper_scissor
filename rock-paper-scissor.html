<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper & Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="rock-paper-scissor.css">
</head>
<body>
    <div class="game-wrapper">
        <header>
            <h1 class="game-title">Rock, Paper &amp; Scissors</h1>
            <p class="subtitle">Choose your weapon</p>
        </header>

        <section class="choices" id="optionSelection">
            <button id="Rock" title="Rock" aria-label="Rock">
                <img src="icons8-hand-rock-100.png" alt="Rock">
                <span>Rock</span>
            </button>
            <button id="Paper" title="Paper" aria-label="Paper">
                <img src="icons8-hand-100.png" alt="Paper">
                <span>Paper</span>
            </button>
            <button id="Scissor" title="Scissors" aria-label="Scissors">
                <img src="icons8-hand-scissors-100.png" alt="Scissors">
                <span>Scissors</span>
            </button>
        </section>

        <section class="versus-display" id="versusDisplay">
            <div class="choice-card">
                <p class="choice-label">Computer</p>
                <div class="choice-icon" id="computerChoiceIcon">❓</div>
                <p class="choice-name" id="computerChoice">Waiting...</p>
            </div>
            <div class="vs-badge">VS</div>
            <div class="choice-card">
                <p class="choice-label">You</p>
                <div class="choice-icon" id="playerChoiceIcon">❓</div>
                <p class="choice-name" id="playerChoice">Waiting...</p>
            </div>
        </section>

        <section class="result-section" id="result">
            <p id="winner">Make your move!</p>
            <p id="result-detail" class="result-detail"></p>
        </section>

        <section class="score-board" id="score-board">
            <h2>Score Board</h2>
            <div class="score-row">
                <div class="score-item">
                    <p class="score-label">Computer</p>
                    <p class="score-value" id="computerScore">0</p>
                </div>
                <div class="score-item draw">
                    <p class="score-label">Draws</p>
                    <p class="score-value" id="drawScore">0</p>
                </div>
                <div class="score-item">
                    <p class="score-label">You</p>
                    <p class="score-value" id="playerScore">0</p>
                </div>
            </div>
            <p class="rounds-played">Rounds played: <span id="roundCount">0</span></p>
        </section>

        <button class="reset-btn" id="resetBtn">Reset Game</button>
    </div>
    <script src="r-pp-sc.js"></script>
</body>
</html>
